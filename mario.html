<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超级马里奥 - Super Mario</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    user-select: none;
    -webkit-user-select: none;
  }
  #game-container {
    position: relative;
    border: 4px solid #333;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 80px rgba(92,148,252,0.3);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #ui {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 8px 16px;
    display: flex;
    justify-content: space-around;
    color: #fff;
    font-size: 14px;
    text-shadow: 2px 2px 0 #000;
    pointer-events: none;
    z-index: 10;
  }
  #ui span { min-width: 100px; text-align: center; }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 24px;
    text-align: center;
    text-shadow: 3px 3px 0 #000;
    pointer-events: none;
    z-index: 20;
    line-height: 1.8;
  }
  #message button {
    pointer-events: all;
    margin-top: 20px;
    padding: 12px 32px;
    font-size: 16px;
    font-family: inherit;
    background: #e4000f;
    color: #fff;
    border: 3px solid #fff;
    cursor: pointer;
    text-shadow: 2px 2px 0 #000;
    border-radius: 4px;
  }
  #message button:hover { background: #ff2010; }
  #controls-hint {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game"></canvas>
  <div id="ui">
    <span>MARIO<br><b id="score">000000</b></span>
    <span>🪙 × <b id="coins">00</b></span>
    <span>WORLD<br><b>1-1</b></span>
    <span>TIME<br><b id="time">400</b></span>
    <span>LIVES<br><b id="lives">3</b></span>
  </div>
  <div id="message"></div>
  <div id="controls-hint">← → 移动 &nbsp;|&nbsp; 空格/↑ 跳跃 &nbsp;|&nbsp; Shift 加速 &nbsp;|&nbsp; R 重新开始</div>
</div>

<script>
// ==================== GAME ENGINE ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Display settings
const TILE = 32;
const WIDTH = 800;
const HEIGHT = 480;
const COLS = Math.ceil(WIDTH / TILE) + 1;
const ROWS = Math.ceil(HEIGHT / TILE);
canvas.width = WIDTH;
canvas.height = HEIGHT;

// Game state
let gameState = 'waiting'; // waiting, playing, won, dead, gameover
let score = 0;
let coinCount = 0;
let lives = 3;
let gameTime = 400;
let timeTimer = 0;
let cameraX = 0;
let shakeTimer = 0;
let shakeIntensity = 0;

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowUp') e.preventDefault();
  if (e.code === 'KeyR') resetGame();
  if (gameState === 'waiting' || gameState === 'won' || gameState === 'gameover') {
    if (e.code === 'Space' || e.code === 'Enter') startGame();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ==================== AUDIO (simple Web Audio tones) ====================
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, duration, type='square', vol=0.08, slide=0) {
  if (!audioCtx) return;
  try {
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slide) osc.frequency.linearRampToValueAtTime(freq + slide, t + duration);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration);
  } catch(e) {}
}
function sfxJump() { playTone(200, 0.15, 'square', 0.06, 400); }
function sfxCoin() { playTone(988, 0.05, 'square', 0.07); setTimeout(() => playTone(1319, 0.15, 'square', 0.07), 50); }
function sfxStomp() { playTone(300, 0.1, 'triangle', 0.07, -200); }
function sfxBump() { playTone(150, 0.12, 'triangle', 0.06); }
function sfxPowerup() { playTone(523, 0.08, 'square', 0.06); setTimeout(() => playTone(659, 0.08, 'square', 0.06), 80); setTimeout(() => playTone(784, 0.08, 'square', 0.06), 160); setTimeout(() => playTone(1047, 0.2, 'square', 0.06), 240); }
function sfxDie() { playTone(330, 0.15, 'square', 0.07); setTimeout(() => playTone(262, 0.15, 'square', 0.07), 150); setTimeout(() => playTone(196, 0.3, 'square', 0.07), 300); }
function sfxWin() { playTone(523, 0.1, 'square', 0.06); setTimeout(() => playTone(659, 0.1, 'square', 0.06), 100); setTimeout(() => playTone(784, 0.1, 'square', 0.06), 200); setTimeout(() => playTone(1047, 0.1, 'square', 0.06), 300); setTimeout(() => playTone(784, 0.1, 'square', 0.06), 400); setTimeout(() => playTone(1047, 0.3, 'square', 0.07), 500); }

// ==================== LEVEL DATA ====================
// Tile types: 0=air, 1=ground, 2=brick, 3=question, 4=pipeTL, 5=pipeTR, 6=pipeBL, 7=pipeBR, 8=used, 9=flagTop, 10=flagPole, 11=stair, 12=cloudBlock
const LEVEL_WIDTH = 210; // tiles
const LEVEL_HEIGHT = 15; // tiles

// Build level
const level = [];
for (let r = 0; r < LEVEL_HEIGHT; r++) {
  level[r] = new Array(LEVEL_WIDTH).fill(0);
}

// Ground (rows 13-14)
for (let r = 13; r < 15; r++) {
  for (let c = 0; c < LEVEL_WIDTH; c++) {
    // Gaps in ground
    if ((c >= 68 && c <= 70) || (c >= 86 && c <= 88) || (c >= 153 && c <= 155)) continue;
    level[r][c] = 1;
  }
}

// Helper functions
function setTile(c, r, t) { if (c >= 0 && c < LEVEL_WIDTH && r >= 0 && r < LEVEL_HEIGHT) level[r][c] = t; }
function setBlock(c, r, t) { setTile(c, r, t); }

// Question blocks
const questionBlocks = [[16,9],[21,9],[22,9],[23,9],[24,9],[80,9],[97,9],[98,9],[109,9],[110,9],[130,9],[140,9]];
questionBlocks.forEach(([c,r]) => setBlock(c, r, 3));

// Brick blocks
const bricks = [[20,9],[50,9],[56,9],[57,9],[58,9],[77,9],[78,9],[100,9],[101,9],[118,9],[119,9],[120,9],[121,9],[128,9],[129,9],[131,9],[132,9],[136,9],[137,9]];
bricks.forEach(([c,r]) => setBlock(c, r, 2));

// Ground decoration (hard blocks at row 13)
[28,29,30,31,32,55,90,91,92,93,94,135,148,149,150].forEach(c => setBlock(c, 12, 1));

// Pipes
function placePipe(c, r, h) {
  setBlock(c, r, 4); setBlock(c+1, r, 5);
  for (let i = 1; i <= h; i++) {
    setBlock(c, r+i, 6); setBlock(c+1, r+i, 7);
  }
}
placePipe(28, 11, 2);
placePipe(38, 10, 3);
placePipe(46, 11, 2);
placePipe(57, 10, 3);
placePipe(105, 10, 3);
placePipe(112, 10, 3);
placePipe(163, 11, 2);
placePipe(170, 10, 3);

// Stairs (end of level)
for (let i = 0; i < 4; i++) {
  for (let j = 0; j <= i; j++) setBlock(184 + i, 13 - j, 11);
}
for (let i = 0; i < 4; i++) {
  for (let j = 0; j <= i; j++) setBlock(188 + i, 13 - j, 11);
}
for (let i = 0; i < 3; i++) {
  for (let j = 0; j <= i + 1; j++) setBlock(192 + i, 13 - j, 11);
}
// Flag pole
setBlock(196, 3, 10); setBlock(196, 4, 10); setBlock(196, 5, 10);
setBlock(196, 6, 10); setBlock(196, 7, 10); setBlock(196, 8, 10);
setBlock(196, 9, 10); setBlock(196, 10, 10); setBlock(196, 11, 10);
setBlock(196, 12, 10); setBlock(196, 13, 9);

// Floating platforms
[30,31,32,33,40,41,42,115,116,117].forEach(c => setBlock(c, 7, 2));
[20,21,22,70,71,72,125,126,127].forEach(c => setBlock(c, 5, 2));

// Cloud blocks (background, row 3)
[8,9,25,26,44,45,63,64,82,83,102,103,122,123,142,143,162,163,182,183].forEach(c => setBlock(c, 2, 12));

// ==================== PARTICLES ====================
const particles = [];
function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: -Math.random() * 6 - 2,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: 2 + Math.random() * 4
    });
  }
}

// ==================== BLOCK STATE ====================
const blockState = {}; // key: "c,r" -> { hits: number, type: original type }
function blockKey(c, r) { return `${c},${r}`; }
function initBlockState(c, r, type) {
  const k = blockKey(c, r);
  if (!blockState[k]) blockState[k] = { hits: 0, type, hasCoin: type === 3, bouncing: 0 };
}
// Initialize all question and brick blocks
for (let r = 0; r < LEVEL_HEIGHT; r++) {
  for (let c = 0; c < LEVEL_WIDTH; c++) {
    if (level[r][c] === 2 || level[r][c] === 3) initBlockState(c, r, level[r][c]);
  }
}

// ==================== COINS (floating) ====================
const floatingCoins = [];

// ==================== ENEMIES ====================
const enemies = [];
const enemyDefs = [
  { x: 22, y: 13, type: 'goomba' },
  { x: 40, y: 13, type: 'goomba' },
  { x: 50, y: 13, type: 'goomba' },
  { x: 72, y: 13, type: 'goomba' },
  { x: 74, y: 13, type: 'goomba' },
  { x: 82, y: 13, type: 'goomba' },
  { x: 95, y: 13, type: 'goomba' },
  { x: 98, y: 13, type: 'goomba' },
  { x: 103, y: 13, type: 'goomba' },
  { x: 106, y: 13, type: 'goomba' },
  { x: 122, y: 13, type: 'goomba' },
  { x: 124, y: 13, type: 'goomba' },
  { x: 143, y: 13, type: 'goomba' },
  { x: 145, y: 13, type: 'goomba' },
  { x: 160, y: 13, type: 'goomba' },
  { x: 162, y: 13, type: 'goomba' },
  { x: 175, y: 13, type: 'goomba' },
  { x: 177, y: 13, type: 'goomba' },
];

function createEnemies() {
  enemies.length = 0;
  enemyDefs.forEach(def => {
    enemies.push({
      x: def.x * TILE,
      y: def.y * TILE,
      width: 28,
      height: 28,
      vx: -0.8,
      vy: 0,
      type: def.type,
      alive: true,
      squishTimer: 0,
      onGround: false,
      animFrame: 0,
      animTimer: 0,
    });
  });
}

// ==================== PLAYER ====================
const player = {
  x: 64,
  y: 0,
  width: 24,
  height: 30,
  vx: 0,
  vy: 0,
  speed: 3.5,
  runSpeed: 5.5,
  jumpForce: -10.5,
  onGround: false,
  facing: 1, // 1=right, -1=left
  animFrame: 0,
  animTimer: 0,
  invincible: 0,
  big: false,
  dead: false,
  deathTimer: 0,
  winTimer: 0,
  sliding: false,
};

function resetPlayer() {
  player.x = 64;
  player.y = 0;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.facing = 1;
  player.animFrame = 0;
  player.animTimer = 0;
  player.invincible = 0;
  player.big = false;
  player.dead = false;
  player.deathTimer = 0;
  player.winTimer = 0;
  player.sliding = false;
}

// ==================== COLLISION HELPERS ====================
function getTile(c, r) {
  if (c < 0 || c >= LEVEL_WIDTH || r < 0 || r >= LEVEL_HEIGHT) return 0;
  return level[r][c];
}

function isSolid(tile) {
  return tile === 1 || tile === 2 || tile === 3 || tile === 4 || tile === 5 ||
         tile === 6 || tile === 7 || tile === 8 || tile === 11 || tile === 10 || tile === 9;
}

function isSolidAt(px, py) {
  const c = Math.floor(px / TILE);
  const r = Math.floor(py / TILE);
  return isSolid(getTile(c, r));
}

function rectsCollide(a, b) {
  return a.x < b.x + b.width && a.x + a.width > b.x &&
         a.y < b.y + b.height && a.y + a.height > b.y;
}

// ==================== BLOCK HIT ====================
function hitBlock(c, r, fromBelow) {
  const k = blockKey(c, r);
  const bs = blockState[k];
  if (!bs || bs.bouncing > 0) return;
  const tile = level[r][c];

  if (tile === 3 && fromBelow) {
    // Question block - give coin
    bs.bouncing = 8;
    coinCount++;
    score += 200;
    sfxCoin();
    // Spawn floating coin
    floatingCoins.push({ x: c * TILE + TILE/2, y: r * TILE - 16, vy: -5, life: 20 });
    spawnParticles(c * TILE + TILE/2, r * TILE, 4, '#fca044');
    bs.hits++;
    if (bs.hits >= 1) {
      level[r][c] = 8; // used block
    }
  } else if (tile === 2 && fromBelow) {
    // Brick block
    if (player.big) {
      // Break brick
      level[r][c] = 0;
      delete blockState[k];
      spawnParticles(c * TILE + TILE/2, r * TILE + TILE/2, 8, '#c84c0c');
      sfxBump();
      score += 50;
      shakeTimer = 6;
      shakeIntensity = 2;
    } else {
      bs.bouncing = 8;
      sfxBump();
      spawnParticles(c * TILE + TILE/2, r * TILE, 3, '#c84c0c');
    }
  }
}

// ==================== PLAYER PHYSICS ====================
function updatePlayer() {
  if (player.dead) {
    player.deathTimer++;
    if (player.deathTimer < 30) {
      player.vy = -8;
    } else {
      player.vy += 0.5;
    }
    player.y += player.vy;
    if (player.deathTimer > 90) {
      lives--;
      if (lives <= 0) {
        gameState = 'gameover';
        document.getElementById('message').innerHTML = 'GAME OVER<br><button onclick="startGame()">重新开始</button>';
      } else {
        resetAfterDeath();
      }
    }
    return;
  }

  if (player.winTimer > 0) {
    player.winTimer--;
    if (player.winTimer === 0) {
      gameState = 'won';
      score += gameTime * 10;
      sfxWin();
      document.getElementById('message').innerHTML = `🎉 恭喜通关! 🎉<br>最终得分: ${score}<br><button onclick="startGame()">再来一局</button>`;
    }
    return;
  }

  // Invincibility timer
  if (player.invincible > 0) player.invincible--;

  // Horizontal movement
  const maxSpeed = keys['ShiftLeft'] || keys['ShiftRight'] ? player.runSpeed : player.speed;
  if (keys['ArrowLeft'] || keys['KeyA']) {
    player.vx = -maxSpeed;
    player.facing = -1;
  } else if (keys['ArrowRight'] || keys['KeyD']) {
    player.vx = maxSpeed;
    player.facing = 1;
  } else {
    // Friction
    player.vx *= 0.75;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }

  // Jumping
  if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.onGround && player.vy === 0) {
    player.vy = player.jumpForce;
    player.onGround = false;
    sfxJump();
  }
  // Variable jump height (release early)
  if (!(keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.vy < -3) {
    player.vy = -3;
  }

  // Gravity
  player.vy += 0.55;
  if (player.vy > 12) player.vy = 12;

  // Move X with collision
  player.x += player.vx;
  resolveCollisionX();

  // Move Y with collision
  player.y += player.vy;
  player.onGround = false;
  resolveCollisionY();

  // Fall death
  if (player.y > HEIGHT + 64) {
    killPlayer();
    return;
  }

  // Camera
  const targetCamX = player.x - WIDTH / 3;
  cameraX += (targetCamX - cameraX) * 0.12;
  if (cameraX < 0) cameraX = 0;
  const maxCamX = LEVEL_WIDTH * TILE - WIDTH;
  if (cameraX > maxCamX) cameraX = maxCamX;

  // Clamp player to level bounds
  if (player.x < 0) player.x = 0;
  if (player.x > LEVEL_WIDTH * TILE - player.width) player.x = LEVEL_WIDTH * TILE - player.width;

  // Animation
  if (player.onGround && Math.abs(player.vx) > 0.5) {
    player.animTimer++;
    if (player.animTimer > (keys['ShiftLeft'] || keys['ShiftRight'] ? 4 : 6)) {
      player.animTimer = 0;
      player.animFrame = (player.animFrame + 1) % 3;
    }
  } else if (player.onGround) {
    player.animFrame = 0;
    player.animTimer = 0;
  } else {
    player.animFrame = 2; // jumping frame
  }
}

function resolveCollisionX() {
  const left = player.x;
  const right = player.x + player.width;
  const top = player.y + 2;
  const bottom = player.y + player.height - 2;

  const cl = Math.floor(left / TILE);
  const cr = Math.floor(right / TILE);
  const rt = Math.floor(top / TILE);
  const rb = Math.floor(bottom / TILE);

  if (player.vx > 0) {
    for (let r = rt; r <= rb; r++) {
      if (isSolid(getTile(cr, r))) {
        player.x = cr * TILE - player.width;
        player.vx = 0;
        break;
      }
    }
  } else if (player.vx < 0) {
    for (let r = rt; r <= rb; r++) {
      if (isSolid(getTile(cl, r))) {
        player.x = (cl + 1) * TILE;
        player.vx = 0;
        break;
      }
    }
  }
}

function resolveCollisionY() {
  const left = player.x + 2;
  const right = player.x + player.width - 2;
  const top = player.y;
  const bottom = player.y + player.height;

  const cl = Math.floor(left / TILE);
  const cr = Math.floor(right / TILE);
  const rt = Math.floor(top / TILE);
  const rb = Math.floor(bottom / TILE);

  if (player.vy > 0) {
    for (let c = cl; c <= cr; c++) {
      if (isSolid(getTile(c, rb))) {
        player.y = rb * TILE - player.height;
        player.vy = 0;
        player.onGround = true;
        return;
      }
    }
  } else if (player.vy < 0) {
    for (let c = cl; c <= cr; c++) {
      if (isSolid(getTile(c, rt))) {
        player.y = (rt + 1) * TILE;
        player.vy = 0;
        hitBlock(c, rt, true);
        return;
      }
    }
    // Check flag pole
    for (let c = cl; c <= cr; c++) {
      const t = getTile(c, rt);
      if (t === 9 || t === 10) {
        player.winTimer = 60;
        player.vx = 0;
        player.vy = 0;
        player.y = (rt + 1) * TILE;
        return;
      }
    }
  }
}

function killPlayer() {
  if (player.invincible > 0 || player.dead) return;
  if (player.big) {
    player.big = false;
    player.height = 30;
    player.invincible = 90;
    sfxPowerup();
    shakeTimer = 10;
    return;
  }
  player.dead = true;
  player.vy = -8;
  player.vx = 0;
  player.deathTimer = 0;
  sfxDie();
}

function resetAfterDeath() {
  resetPlayer();
  createEnemies();
  floatingCoins.length = 0;
  particles.length = 0;
  // Reset block states
  for (const k in blockState) {
    const bs = blockState[k];
    bs.hits = 0;
    bs.bouncing = 0;
    const [c, r] = k.split(',').map(Number);
    if (bs.type === 3) level[r][c] = 3;
    else if (bs.type === 2) level[r][c] = 2;
  }
  cameraX = 0;
  gameTime = 400;
  gameState = 'playing';
  document.getElementById('message').innerHTML = '';
}

// ==================== ENEMY UPDATE ====================
function updateEnemies() {
  enemies.forEach(enemy => {
    if (!enemy.alive) {
      enemy.squishTimer--;
      return;
    }

    // Only update if near camera
    if (Math.abs(enemy.x - cameraX) > WIDTH + 100) return;

    // Gravity
    enemy.vy += 0.5;
    if (enemy.vy > 10) enemy.vy = 10;

    // Move X
    enemy.x += enemy.vx;
    const el = Math.floor(enemy.x / TILE);
    const er = Math.floor((enemy.x + enemy.width) / TILE);
    const et = Math.floor(enemy.y / TILE);
    const eb = Math.floor((enemy.y + enemy.height) / TILE);

    // Wall collision
    if (enemy.vx > 0) {
      for (let r = et; r <= eb; r++) {
        if (isSolid(getTile(er, r)) || enemy.x + enemy.width >= LEVEL_WIDTH * TILE) {
          enemy.x = er * TILE - enemy.width;
          enemy.vx *= -1;
          break;
        }
      }
    } else if (enemy.vx < 0) {
      for (let r = et; r <= eb; r++) {
        if (isSolid(getTile(el, r)) || enemy.x <= 0) {
          enemy.x = (el + 1) * TILE;
          enemy.vx *= -1;
          break;
        }
      }
    }

    // Move Y
    enemy.y += enemy.vy;
    const nl = Math.floor((enemy.x + 2) / TILE);
    const nr = Math.floor((enemy.x + enemy.width - 2) / TILE);
    const nb = Math.floor((enemy.y + enemy.height) / TILE);
    enemy.onGround = false;

    if (enemy.vy > 0) {
      for (let c = nl; c <= nr; c++) {
        if (isSolid(getTile(c, nb))) {
          enemy.y = nb * TILE - enemy.height;
          enemy.vy = 0;
          enemy.onGround = true;
          break;
        }
      }
    }
    if (enemy.vy < 0) {
      const nt = Math.floor(enemy.y / TILE);
      for (let c = nl; c <= nr; c++) {
        if (isSolid(getTile(c, nt))) {
          enemy.y = (nt + 1) * TILE;
          enemy.vy = 0;
          break;
        }
      }
    }

    // Fall death
    if (enemy.y > HEIGHT + 64) enemy.alive = false;

    // Animation
    enemy.animTimer++;
    if (enemy.animTimer > 12) {
      enemy.animTimer = 0;
      enemy.animFrame = (enemy.animFrame + 1) % 2;
    }
  });

  // Clean up dead enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (!enemies[i].alive && enemies[i].squishTimer <= 0) {
      enemies.splice(i, 1);
    }
  }
}

// ==================== PLAYER-ENEMY COLLISION ====================
function checkEnemyCollisions() {
  if (player.invincible > 0 || player.dead || player.winTimer > 0) return;

  enemies.forEach(enemy => {
    if (!enemy.alive) return;
    if (!rectsCollide(player, enemy)) return;

    // Check if player is falling onto enemy
    if (player.vy > 0 && player.y + player.height - enemy.y < 16) {
      // Stomp!
      enemy.alive = false;
      enemy.squishTimer = 20;
      player.vy = -7;
      score += 100;
      sfxStomp();
      spawnParticles(enemy.x + enemy.width/2, enemy.y + enemy.height, 4, '#b07030');
    } else {
      killPlayer();
    }
  });
}

// ==================== COIN COLLECTION ====================
function checkCoinCollisions() {
  for (let i = floatingCoins.length - 1; i >= 0; i--) {
    const coin = floatingCoins[i];
    coin.y += coin.vy;
    coin.vy += 0.2;
    coin.life--;
    if (coin.life <= 0) {
      floatingCoins.splice(i, 1);
      continue;
    }
    // Check collision with player
    const cr = { x: coin.x - 8, y: coin.y - 8, width: 16, height: 16 };
    if (rectsCollide(player, cr)) {
      coinCount++;
      score += 100;
      sfxCoin();
      floatingCoins.splice(i, 1);
    }
  }
}

// ==================== PARTICLES UPDATE ====================
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ==================== BLOCK ANIMATION UPDATE ====================
function updateBlocks() {
  for (const k in blockState) {
    const bs = blockState[k];
    if (bs.bouncing > 0) bs.bouncing--;
  }
}

// ==================== RENDER ====================
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
  grad.addColorStop(0, '#5c94fc');
  grad.addColorStop(1, '#92b8fc');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
}

function drawCloud(cx, cy, w) {
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx, cy, w, 20);
  ctx.fillRect(cx + 8, cy - 10, w - 16, 30);
  ctx.fillRect(cx + 16, cy - 6, w - 8, 26);
}

function drawClouds() {
  const positions = [
    { x: 100, y: 60, w: 64 },
    { x: 380, y: 40, w: 80 },
    { x: 650, y: 70, w: 56 },
    { x: 950, y: 35, w: 72 },
    { x: 1300, y: 55, w: 60 },
    { x: 1700, y: 45, w: 76 },
    { x: 2100, y: 65, w: 54 },
    { x: 2600, y: 40, w: 68 },
    { x: 3100, y: 58, w: 72 },
    { x: 3700, y: 42, w: 64 },
    { x: 4300, y: 62, w: 78 },
    { x: 4900, y: 48, w: 56 },
    { x: 5500, y: 55, w: 70 },
    { x: 5800, y: 38, w: 64 },
  ];
  positions.forEach(({ x, y, w }) => {
    const px = x - cameraX * 0.3;
    if (px > -w && px < WIDTH + w) drawCloud(px, y, w);
  });
}

function drawHill(x, y, w, h) {
  ctx.fillStyle = '#58b858';
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + h, w/2, h * 0.8, 0, Math.PI, 0);
  ctx.fill();
}

function drawHills() {
  const hills = [
    { x: 0, y: 416, w: 180, h: 60 },
    { x: 350, y: 416, w: 140, h: 50 },
    { x: 700, y: 416, w: 200, h: 55 },
    { x: 1200, y: 416, w: 160, h: 48 },
    { x: 1800, y: 416, w: 180, h: 62 },
    { x: 2600, y: 416, w: 150, h: 52 },
    { x: 3400, y: 416, w: 190, h: 58 },
    { x: 4400, y: 416, w: 170, h: 54 },
    { x: 5400, y: 416, w: 160, h: 50 },
  ];
  hills.forEach(({ x, y, w, h }) => {
    const px = x - cameraX * 0.5;
    if (px > -w && px < WIDTH + w) drawHill(px, y, w, h);
  });
}

function drawTile(tile, screenX, screenY, c, r) {
  const x = screenX, y = screenY;
  const k = blockKey(c, r);
  const bs = blockState[k];
  const bounceOffset = bs && bs.bouncing > 0 ? -Math.sin(bs.bouncing / 8 * Math.PI) * 8 : 0;
  const by = y + bounceOffset;

  switch (tile) {
    case 1: // Ground
      ctx.fillStyle = '#c84c0c';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#e09050';
      ctx.fillRect(x, y, TILE, 2);
      ctx.fillRect(x, y, 2, TILE);
      // Brick pattern
      ctx.fillStyle = '#a03808';
      ctx.fillRect(x + TILE/2, y, 1, TILE);
      ctx.fillRect(x, y + TILE/2, TILE/2, 1);
      ctx.fillRect(x + TILE/2 + 1, y + TILE/2 + 1, TILE/2 - 1, 1);
      break;

    case 2: // Brick
      ctx.fillStyle = '#c84c0c';
      ctx.fillRect(x, by, TILE, TILE);
      ctx.fillStyle = '#e09050';
      ctx.fillRect(x, by, TILE, 2);
      ctx.fillRect(x, by + TILE/2, TILE, 2);
      ctx.strokeStyle = '#803000';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 1, by + 1, TILE - 2, TILE/2 - 2);
      ctx.strokeRect(x + 1, by + TILE/2 + 1, TILE - 2, TILE/2 - 2);
      // Mortar
      ctx.fillStyle = '#6b3000';
      ctx.fillRect(x, by + TILE/2 - 1, TILE, 2);
      ctx.fillRect(x + TILE/2, by, 2, TILE/2);
      ctx.fillRect(x + TILE/4, by + TILE/2, 2, TILE/2);
      ctx.fillRect(x + TILE*3/4, by + TILE/2, 2, TILE/2);
      break;

    case 3: // Question block
      ctx.fillStyle = '#fca044';
      ctx.fillRect(x, by, TILE, TILE);
      ctx.fillStyle = '#f8d878';
      ctx.fillRect(x + 2, by + 2, TILE - 4, TILE - 4);
      ctx.strokeStyle = '#c87828';
      ctx.lineWidth = 2;
      ctx.strokeRect(x + 1, by + 1, TILE - 2, TILE - 2);
      // Question mark
      ctx.fillStyle = '#c87828';
      ctx.font = 'bold 18px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('?', x + TILE/2, by + TILE/2 + 7);
      break;

    case 4: // Pipe top-left
      ctx.fillStyle = '#00a800';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#00d800';
      ctx.fillRect(x + 2, y, TILE - 2, TILE - 2);
      ctx.fillStyle = '#58e058';
      ctx.fillRect(x + 2, y, TILE - 2, 4);
      ctx.fillRect(x + 2, y, 6, TILE);
      ctx.strokeStyle = '#006800';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, TILE, TILE);
      break;

    case 5: // Pipe top-right
      ctx.fillStyle = '#00a800';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#00d800';
      ctx.fillRect(x, y, TILE - 2, TILE - 2);
      ctx.fillStyle = '#58e058';
      ctx.fillRect(x, y, TILE - 2, 4);
      ctx.strokeStyle = '#006800';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, TILE, TILE);
      break;

    case 6: // Pipe body-left
      ctx.fillStyle = '#00a800';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#00d800';
      ctx.fillRect(x + 2, y, TILE - 2, TILE);
      ctx.fillStyle = '#58e058';
      ctx.fillRect(x + 2, y, 6, TILE);
      ctx.strokeStyle = '#006800';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, TILE, TILE);
      break;

    case 7: // Pipe body-right
      ctx.fillStyle = '#00a800';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#00d800';
      ctx.fillRect(x, y, TILE - 2, TILE);
      ctx.strokeStyle = '#006800';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, TILE, TILE);
      break;

    case 8: // Used block
      ctx.fillStyle = '#886848';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#a89070';
      ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
      ctx.strokeStyle = '#604830';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
      break;

    case 10: // Flag pole
      ctx.fillStyle = '#888';
      ctx.fillRect(x + TILE/2 - 2, y, 4, TILE);
      ctx.fillStyle = '#aaa';
      ctx.fillRect(x + TILE/2 - 1, y, 2, TILE);
      break;

    case 9: // Flag top
      ctx.fillStyle = '#888';
      ctx.fillRect(x + TILE/2 - 2, y, 4, TILE);
      ctx.fillStyle = '#aaa';
      ctx.fillRect(x + TILE/2 - 1, y, 2, TILE);
      // Ball on top
      ctx.fillStyle = '#0c0';
      ctx.beginPath();
      ctx.arc(x + TILE/2, y, 6, 0, Math.PI * 2);
      ctx.fill();
      // Flag
      ctx.fillStyle = '#0c0';
      ctx.beginPath();
      ctx.moveTo(x + TILE/2 + 6, y + 4);
      ctx.lineTo(x + TILE/2 + 6 + 22, y + 14);
      ctx.lineTo(x + TILE/2 + 6, y + 22);
      ctx.fill();
      break;

    case 11: // Stair block
      ctx.fillStyle = '#909090';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#b0b0b0';
      ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
      ctx.fillStyle = '#d0d0d0';
      ctx.fillRect(x + 2, y + 2, TILE - 4, 3);
      ctx.strokeStyle = '#606060';
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, TILE, TILE);
      break;

    case 12: // Cloud block (decorative, non-solid)
      break;
  }
}

function drawMario(mario, screenX, screenY) {
  if (mario.dead && mario.deathTimer % 4 < 2) return;
  if (mario.invincible > 0 && Math.floor(mario.invincible / 4) % 2 === 0) return;

  const x = screenX;
  const y = screenY;
  const f = mario.facing;

  ctx.save();
  if (f === -1) {
    ctx.translate(x + mario.width/2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-(x + mario.width/2), 0);
  }

  const h = mario.height;

  // Body (blue overalls)
  ctx.fillStyle = '#2040c0';
  ctx.fillRect(x + 6, y + 14, mario.width - 12, h - 14);

  // Shirt (red)
  ctx.fillStyle = '#e4000f';
  ctx.fillRect(x + 5, y + 8, mario.width - 10, 8);

  // Head (skin)
  ctx.fillStyle = '#fca044';
  ctx.fillRect(x + 6, y + 2, mario.width - 12, 8);

  // Hat (red)
  ctx.fillStyle = '#e4000f';
  ctx.fillRect(x + 2, y, mario.width - 2, 7);
  ctx.fillRect(x + mario.width - 6, y - 2, 8, 6);

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(x + mario.width - 12, y + 4, 3, 3);

  // Belt/shoes
  ctx.fillStyle = '#804000';
  ctx.fillRect(x + 4, y + h - 4, mario.width - 8, 4);

  // Running animation - leg offset
  if (mario.animFrame === 1 && mario.onGround && Math.abs(mario.vx) > 0.5) {
    ctx.fillStyle = '#2040c0';
    ctx.fillRect(x + 6, y + h - 2, 3, 4);
    ctx.fillRect(x + mario.width - 9, y + h - 4, 3, 4);
  }

  ctx.restore();
}

function drawEnemy(enemy, screenX, screenY) {
  if (!enemy.alive) {
    // Squished
    ctx.fillStyle = '#b07030';
    ctx.fillRect(screenX, screenY + enemy.height - 10, enemy.width, 10);
    return;
  }

  const x = screenX;
  const y = screenY;

  // Body
  ctx.fillStyle = '#b07030';
  ctx.fillRect(x + 4, y + 4, enemy.width - 8, enemy.height - 4);

  // Head (bigger, rounded)
  ctx.fillStyle = '#c88040';
  ctx.fillRect(x + 2, y, enemy.width - 4, enemy.height - 8);

  // Eyes (white with black pupil)
  const eyeY = y + 6;
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + 8, eyeY, 6, 6);
  ctx.fillRect(x + enemy.width - 14, eyeY, 6, 6);
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 10 + (enemy.vx < 0 ? 2 : 0), eyeY + 1, 3, 4);
  ctx.fillRect(x + enemy.width - 12 + (enemy.vx < 0 ? 2 : 0), eyeY + 1, 3, 4);

  // Eyebrows (angry)
  ctx.fillStyle = '#603000';
  ctx.fillRect(x + 7, eyeY - 2, 8, 2);
  ctx.fillRect(x + enemy.width - 15, eyeY - 2, 8, 2);

  // Feet
  const footOffset = enemy.animFrame === 1 ? 2 : 0;
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 4 + footOffset, y + enemy.height - 4, 8, 4);
  ctx.fillRect(x + enemy.width - 12 - footOffset, y + enemy.height - 4, 8, 4);
}

function drawCoin(x, y, life) {
  const scale = Math.min(1, life / 10);
  const alpha = Math.min(1, life / 5);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(x, y, 6 * scale, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffec80';
  ctx.beginPath();
  ctx.arc(x - 1, y - 2, 2.5 * scale, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, WIDTH, HEIGHT);

  // Camera shake
  let shakeX = 0, shakeY = 0;
  if (shakeTimer > 0) {
    shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
    shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
    shakeTimer--;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawSky();
  drawClouds();
  drawHills();

  // Draw tiles
  const startCol = Math.floor(cameraX / TILE);
  const endCol = startCol + COLS;
  for (let r = 0; r < LEVEL_HEIGHT; r++) {
    for (let c = startCol; c <= endCol; c++) {
      if (c < 0 || c >= LEVEL_WIDTH) continue;
      const tile = level[r][c];
      if (tile === 0) continue;
      const sx = c * TILE - cameraX;
      const sy = r * TILE;
      drawTile(tile, sx, sy, c, r);
    }
  }

  // Draw floating coins
  floatingCoins.forEach(coin => {
    drawCoin(coin.x - cameraX, coin.y, coin.life);
  });

  // Draw enemies
  enemies.forEach(enemy => {
    if (Math.abs(enemy.x - cameraX) > WIDTH + 50) return;
    drawEnemy(enemy, enemy.x - cameraX, enemy.y);
  });

  // Draw player
  drawMario(player, player.x - cameraX, player.y);

  // Draw particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(p.x - cameraX, p.y, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  ctx.restore();

  // Update UI
  document.getElementById('score').textContent = String(score).padStart(6, '0');
  document.getElementById('coins').textContent = String(coinCount).padStart(2, '0');
  document.getElementById('lives').textContent = lives;
  document.getElementById('time').textContent = gameTime;
}

// ==================== GAME LOOP ====================
function update() {
  if (gameState !== 'playing') return;

  // Timer
  timeTimer++;
  if (timeTimer >= 60) {
    timeTimer = 0;
    gameTime--;
    if (gameTime <= 0) {
      killPlayer();
      gameTime = 0;
    }
  }

  updatePlayer();
  updateEnemies();
  checkEnemyCollisions();
  checkCoinCollisions();
  updateBlocks();
  updateParticles();
}

function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// ==================== GAME CONTROL ====================
function startGame() {
  initAudio();
  score = 0;
  coinCount = 0;
  lives = 3;
  gameTime = 400;
  timeTimer = 0;
  cameraX = 0;
  resetPlayer();
  createEnemies();
  floatingCoins.length = 0;
  particles.length = 0;
  // Reset block states
  for (const k in blockState) {
    const bs = blockState[k];
    bs.hits = 0;
    bs.bouncing = 0;
    const [c, r] = k.split(',').map(Number);
    if (bs.type === 3) level[r][c] = 3;
    else if (bs.type === 2) level[r][c] = 2;
  }
  shakeTimer = 0;
  shakeIntensity = 0;
  gameState = 'playing';
  document.getElementById('message').innerHTML = '';
}

function resetGame() {
  startGame();
}

// ==================== START ====================
// Show initial message
document.getElementById('message').innerHTML = `
  <div style="font-size:28px;color:#e4000f;margin-bottom:10px;">超级马里奥</div>
  <div style="font-size:14px;">SUPER MARIO</div>
  <br>
  <button onclick="startGame()">开始游戏</button>
`;
createEnemies();
gameLoop();

console.log('🍄 超级马里奥准备就绪!');
console.log('操作: ← → 移动 | 空格/↑ 跳跃 | Shift 加速 | R 重新开始');
</script>
